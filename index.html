<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Verificador de Edad</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #f5f5f3; font-family: system-ui, -apple-system, sans-serif; }
    #app { min-height: 100dvh; display: flex; flex-direction: column; align-items: center; padding: 1rem; gap: 1rem; }
    #result-banner { display: none; width: 100%; max-width: 420px; border-radius: 16px; padding: 2.5rem 1.5rem; flex-direction: column; align-items: center; gap: 0.5rem; text-align: center; }
    #result-banner.mayor { background: #1D9E75; display: flex; }
    #result-banner.menor { background: #E24B4A; display: flex; }
    #result-icon { font-size: 72px; line-height: 1; }
    #result-label { font-size: 48px; font-weight: 700; color: #fff; letter-spacing: 1px; }
    #result-detail { font-size: 15px; color: rgba(255,255,255,0.85); margin-top: 4px; }
    #cam-section { width: 100%; max-width: 420px; display: flex; flex-direction: column; align-items: center; gap: 0.75rem; }
    video, #preview-img { width: 100%; border-radius: 12px; border: 1px solid #ddd; background: #000; display: block; }
    #preview-img { display: none; }
    canvas { display: none; }
    #status { font-size: 14px; color: #666; text-align: center; min-height: 20px; }
    #spinner { display: none; font-size: 28px; color: #3C3489; animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .btn-main { width: 100%; padding: 16px; font-size: 18px; font-weight: 600; border-radius: 14px; border: none; cursor: pointer; background: #3C3489; color: #fff; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .btn-main:disabled { background: #ccc; color: #888; cursor: not-allowed; }
    .btn-main i { font-size: 22px; }
    .btn-secondary { width: 100%; padding: 12px; font-size: 15px; border-radius: 12px; border: 1px solid #ccc; background: #fff; color: #333; cursor: pointer; display: none; align-items: center; justify-content: center; gap: 8px; }
    .btn-secondary.visible { display: flex; }
    #manual-section { width: 100%; max-width: 420px; border-top: 1px solid #ddd; padding-top: 1rem; }
    #manual-section p { font-size: 13px; color: #888; margin-bottom: 8px; }
    #manual-date { width: 100%; padding: 12px; font-size: 16px; border-radius: 10px; border: 1px solid #ccc; background: #fff; color: #222; }
    .btn-manual { width: 100%; margin-top: 8px; padding: 12px; font-size: 15px; border-radius: 10px; border: 1px solid #ccc; background: #fff; color: #333; cursor: pointer; }
  </style>
</head>
<body>
<div id="app">
  <div id="result-banner">
    <div id="result-icon"></div>
    <div id="result-label"></div>
    <div id="result-detail"></div>
  </div>
  <div id="cam-section">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <img id="preview-img" alt="Foto de la cédula" />
    <div id="status">Iniciando cámara...</div>
    <i class="ti ti-loader-2" id="spinner"></i>
    <button class="btn-main" id="btn-capture" disabled>
      <i class="ti ti-camera"></i> Fotografiar cédula
    </button>
    <button class="btn-secondary" id="btn-retry">
      <i class="ti ti-refresh"></i> Sacar otra foto
    </button>
  </div>
  <div id="manual-section">
    <p>¿No funciona la cámara? Ingresá la fecha manualmente:</p>
    <input type="date" id="manual-date" />
    <button class="btn-manual" id="btn-manual">Verificar fecha</button>
  </div>
</div>
<script>
const video=document.getElementById('video'),canvas=document.getElementById('canvas'),preview=document.getElementById('preview-img'),btnCapture=document.getElementById('btn-capture'),btnRetry=document.getElementById('btn-retry'),statusEl=document.getElementById('status'),spinner=document.getElementById('spinner'),banner=document.getElementById('result-banner'),resultIcon=document.getElementById('result-icon'),resultLabel=document.getElementById('result-label'),resultDetail=document.getElementById('result-detail'),manualDate=document.getElementById('manual-date'),btnManual=document.getElementById('btn-manual');
function showBanner(esMayor,edad,fechaNac){banner.className='result-banner '+(esMayor?'mayor':'menor');resultIcon.textContent=esMayor?'✅':'🚫';resultLabel.textContent=esMayor?'MAYOR DE EDAD':'MENOR DE EDAD';resultDetail.textContent='Nacimiento: '+fechaNac+'  •  Edad: '+edad+' años';window.scrollTo({top:0,behavior:'smooth'});}
function calcularEdad(fechaStr){const hoy=new Date(),nac=new Date(fechaStr);if(isNaN(nac))return null;let edad=hoy.getFullYear()-nac.getFullYear();const m=hoy.getMonth()-nac.getMonth();if(m<0||(m===0&&hoy.getDate()<nac.getDate()))edad--;return edad;}
async function initCamera(){try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}}});video.srcObject=s;btnCapture.disabled=false;statusEl.textContent='Enfocá la cédula y presioná el botón.';}catch(e){statusEl.textContent='No se pudo acceder a la cámara. Usá el ingreso manual.';}}
function resetUI(){banner.className='result-banner';preview.style.display='none';btnRetry.classList.remove('visible');video.style.display='block';btnCapture.style.display='flex';btnCapture.disabled=false;statusEl.textContent='Enfocá la cédula y presioná el botón.';spinner.style.display='none';}
btnCapture.addEventListener('click',async()=>{canvas.width=video.videoWidth;canvas.height=video.videoHeight;canvas.getContext('2d').drawImage(video,0,0);const base64=canvas.toDataURL('image/jpeg',0.85).split(',')[1];preview.src='data:image/jpeg;base64,'+base64;preview.style.display='block';video.style.display='none';btnCapture.style.display='none';btnRetry.classList.add('visible');spinner.style.display='block';statusEl.textContent='Analizando cédula...';banner.className='result-banner';
try{const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:200,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:base64}},{type:'text',text:'Esta es una foto de una cédula de identidad paraguaya. Extraé ÚNICAMENTE la fecha de nacimiento. Respondé SOLO con un JSON así: {"fecha_nacimiento": "YYYY-MM-DD"} — sin texto adicional, sin explicaciones, sin markdown. Si no podés leer la fecha respondé: {"error": "no se pudo leer"}.'}]}]})});
const data=await resp.json();spinner.style.display='none';const textBlock=(data.content||[]).find(b=>b.type==='text');if(!textBlock)throw new Error('Sin respuesta');let parsed;try{parsed=JSON.parse(textBlock.text.replace(/```json|```/g,'').trim());}catch{throw new Error('Parse error');}
if(parsed.error||!parsed.fecha_nacimiento){statusEl.textContent='⚠️ No se pudo leer la fecha. Intentá de nuevo o usá el ingreso manual.';return;}
const edad=calcularEdad(parsed.fecha_nacimiento);if(edad===null){statusEl.textContent='⚠️ Fecha inválida.';return;}
const fechaFmt=new Date(parsed.fecha_nacimiento+'T12:00:00').toLocaleDateString('es-PY',{day:'2-digit',month:'2-digit',year:'numeric'});statusEl.textContent='';showBanner(edad>=18,edad,fechaFmt);}catch(e){spinner.style.display='none';statusEl.textContent='❌ Error al analizar. Intentá de nuevo.';}});
btnRetry.addEventListener('click',resetUI);
btnManual.addEventListener('click',()=>{const val=manualDate.value;if(!val){statusEl.textContent='Ingresá una fecha válida.';return;}const edad=calcularEdad(val);const fechaFmt=new Date(val+'T12:00:00').toLocaleDateString('es-PY',{day:'2-digit',month:'2-digit',year:'numeric'});showBanner(edad>=18,edad,fechaFmt);});
initCamera();
</script>
</body>
</html>
